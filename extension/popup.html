<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Notion Local Bridge</title>
  <style>
    :root {
      --bg: #ffffff;
      --bg-elev: #f7f7f5;
      --text: #37352f;
      --text-muted: #787774;
      --border: #e9e9e7;
      --accent: #2383e2;
      --accent-hover: #1a6fc4;
      --accent-soft: rgba(35, 131, 226, 0.12);
      --success: #0f7b6c;
      --error: #eb5757;
      --radius: 8px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #191919;
        --bg-elev: #242424;
        --text: #e6e6e4;
        --text-muted: #9b9a97;
        --border: #2f2f2f;
        --accent: #2f8fed;
        --accent-hover: #4a9ff0;
        --accent-soft: rgba(47, 143, 237, 0.18);
      }
    }
    * { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, "Apple Color Emoji", Arial, sans-serif;
      width: 360px;
      margin: 0;
      padding: 16px;
      color: var(--text);
      background: var(--bg);
      font-size: 13px;
      line-height: 1.4;
    }
    .nlb-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }
    .nlb-logo {
      width: 34px;
      height: 34px;
      flex: none;
      display: block;
      border-radius: 9px;
      box-shadow: 0 1px 4px rgba(15, 15, 15, 0.12);
    }
    .nlb-header h1 { font-size: 14px; font-weight: 600; margin: 0; }
    .nlb-subtitle { font-size: 11px; color: var(--text-muted); margin: 2px 0 0; display: flex; align-items: center; gap: 6px; }

    /* Connection indicator */
    .conn-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex: none;
      background: var(--text-muted);
      transition: background .2s, box-shadow .2s;
    }
    .conn-dot--unknown { background: var(--text-muted); }
    .conn-dot--ok { background: #2ecc71; box-shadow: 0 0 6px rgba(46, 204, 113, 0.7); }
    .conn-dot--warn { background: #f5a623; box-shadow: 0 0 6px rgba(245, 166, 35, 0.7); }
    .conn-dot--error { background: var(--error); box-shadow: 0 0 6px rgba(235, 87, 87, 0.6); }

    .field-label {
      font-size: 11px; font-weight: 500; color: var(--text-muted);
      display: block; margin-bottom: 6px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .row { display: flex; gap: 8px; }
    input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-elev);
      color: var(--text);
      font-size: 13px;
      transition: border-color .15s, box-shadow .15s;
    }
    input[type="text"]::placeholder { color: var(--text-muted); }
    input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }
    button {
      font-family: inherit;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      padding: 8px 14px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      transition: background .15s, transform .05s;
    }
    button:hover:not(:disabled) { background: var(--accent-hover); }
    button:active:not(:disabled) { transform: scale(0.98); }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-secondary {
      background: var(--bg-elev);
      color: var(--text);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover:not(:disabled) { background: var(--border); }
    .btn-ghost {
      background: transparent;
      color: var(--text-muted);
      font-weight: 500;
      padding: 4px 8px;
    }
    .btn-ghost:hover:not(:disabled) { background: var(--bg-elev); color: var(--text); }

    .tree-card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin: 14px 0;
      background: var(--bg-elev);
    }
    .tree-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
    }
    .tree-header .left { display: flex; align-items: center; gap: 8px; font-size: 12px; font-weight: 500; cursor: pointer; }
    .tree-header .count { color: var(--text-muted); font-weight: 400; }
    #file-tree { max-height: 240px; overflow-y: auto; padding: 6px; }
    .file-item {
      display: flex; align-items: center; gap: 8px;
      padding: 5px 8px;
      border-radius: 6px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .file-item:hover { background: var(--accent-soft); }
    .file-item input { accent-color: var(--accent); flex: none; }
    .tree-empty { color: var(--text-muted); padding: 16px; text-align: center; font-size: 12px; }

    .full-width { width: 100%; padding: 10px; }

    #status { font-size: 12px; margin-top: 10px; min-height: 16px; color: var(--text-muted); }
    #status.error { color: var(--error); }
    #status.success { color: var(--success); }
  </style>
</head>
<body>
  <header class="nlb-header">
    <img class="nlb-logo" src="icons/icon48.png" alt="Notion Local Bridge">
    <div>
      <h1>Notion Local Bridge</h1>
      <p class="nlb-subtitle">
        <span id="conn-dot" class="conn-dot conn-dot--unknown"></span>
        <span id="conn-text">Проверка соединения…</span>
      </p>
    </div>
  </header>

  <label class="field-label" for="project-dir">Папка проекта</label>
  <div class="row">
    <input type="text" id="project-dir" placeholder="~/Projects/MyProject" autocomplete="off">
    <button id="btn-browse" class="btn-secondary" title="Выбрать папку в проводнике">Обзор…</button>
    <button id="btn-load">Загрузить</button>
  </div>

  <div class="tree-card">
    <div class="tree-header">
      <label class="left">
        <input type="checkbox" id="select-all">
        Файлы <span class="count" id="file-count"></span>
      </label>
      <button class="btn-ghost" id="btn-refresh" title="Обновить">↻</button>
    </div>
    <div id="file-tree">
      <div class="tree-empty">Загрузите проект, чтобы увидеть файлы…</div>
    </div>
  </div>

  <button id="btn-send" class="full-width" disabled>Скопировать выбранное для Notion</button>
  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
